name: Tranzo CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 1. SMART CONTRACTS
  smart-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run Forge Tests
        working-directory: smart_contracts
        run: forge test -vvv

  # 2. BACKEND
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps
      - name: Prisma Generate
        working-directory: backend
        run: npx prisma generate
      - name: Build Backend
        working-directory: backend
        run: npm run build
      - name: Build Docker Image
        working-directory: backend
        run: docker build -t tranzo-backend:latest .

  # 3. ANDROID APP
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload debug APK to Telegram
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "APK not found at $APK"
            exit 1
          fi
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Add repository secrets TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          REF_NAME="${GITHUB_REF_NAME:-unknown}"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          CAPTION="$(printf 'Tranzo Custody (debug)\n%s @ %s\n%s/%s/actions/runs/%s' \
            "$REF_NAME" "$SHA_SHORT" "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}")"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK};filename=tranzo-custody-${REF_NAME}-debug.apk" \
            -F "caption=${CAPTION}" \
            -o /tmp/tg-response.json
          if ! python3 -c 'import json,sys; d=json.load(open("/tmp/tg-response.json")); sys.exit(0 if d.get("ok") else 1)'; then
            echo "Telegram API error:"
            cat /tmp/tg-response.json
            exit 1
          fi
          echo "APK sent to Telegram."
