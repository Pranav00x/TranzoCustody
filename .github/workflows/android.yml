name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Send APK to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          AUTHOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          SHORT_SHA=$(echo "$COMMIT" | cut -c1-7)
          CAPTION=$(printf "✅ <b>Tranzo Build Successful</b>\n\n📦 Branch: <code>%s</code>\n🔨 Commit: <code>%s</code>\n👤 Author: %s\n🔗 <a href='%s'>View Build</a>" "$BRANCH" "$SHORT_SHA" "$AUTHOR" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"${APK_PATH}" \
            -F caption="${CAPTION}" \
            -F parse_mode="HTML"

      - name: Send Telegram failure notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          AUTHOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA=$(echo "$COMMIT" | cut -c1-7)
          TEXT=$(printf "❌ <b>Tranzo Build Failed</b>\n\n📦 Branch: <code>%s</code>\n🔨 Commit: <code>%s</code>\n👤 Author: %s\n🔗 <a href='%s'>View Build</a>" "$BRANCH" "$SHORT_SHA" "$AUTHOR" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${TEXT}"
